
# Site settings
remote_theme: mmistakes/jekyll-theme-basically-basic
skin: "/assets/css/skins/default.css"
locale: en-US
title: Jake LaCaze
description: Writer based in Dallas-Fort Worth
baseurl: # the subpath of your site, e.g. "/blog"
url: https://jakelacaze.com
logo: /assets/img/logo.jpg
date_format: "%B %-d, %Y"
email: contact@jakelacaze.com
bmc_username: jakelacaze
google_fonts:
  - name: "Source Sans Pro"
    weights: "400,400i,700,700i"
  - name: "Lora"
    weights: "400,400i,700,700i"

# Liquid
liquid:
  error_mode: strict

# Build settings
permalink: /:categories/:title/
markdown: kramdown
feed:
  path: feed.xml

# Pagination - https://jekyllrb.com/docs/pagination/
paginate: 10
paginate_path: /page:num/

# Search
search: true
search_full_content: true # can have performance implications for large sites

# Taxonomy pages
category_archive_path: "/categories/#"
tag_archive_path: "/tags/#"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate
  - jekyll-remote-theme
  - jekyll-redirect-from

# Front Matter Defaults
defaults:
  # Posts defaults
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      share: true
      read_time: true
  - scope:
      path: "_vignettes"
      type: vignettes
    values:
      layout: page
      share: true
  - scope:
      path: "_stories"
      type: stories
    values:
      layout: page
      share: true

collections:
  vignettes:
    output: true
  stories:
    outut: true